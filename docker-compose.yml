version: '3.8'

services:
  # 프론트엔드 (Nginx 정적 서빙)
  clip-inview:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: clip-inview
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - converter
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # 백엔드 변환 서비스 (ODA File Converter 연동)
  converter:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: clip-inview-converter
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - PORT=3001
    volumes:
      # ODA File Converter가 호스트에 설치된 경우 마운트
      # - /opt/ODAFileConverter:/opt/ODAFileConverter:ro
      - /tmp/clip-inview-convert:/tmp/clip-inview-convert
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
