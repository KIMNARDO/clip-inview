version: '3.8'

services:
  clip-inview:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clip-inview
    ports:
      - "8080:80"
    restart: unless-stopped
    # 리소스 제한 (온프레미스 서버 보호)
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
