server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # --- 보안 헤더 ---

    # CSP: 외부 도메인 연결 완전 차단, WASM 허용
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # 클릭재킹 방지
    add_header X-Frame-Options "DENY" always;

    # MIME 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 필터
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer 정보 최소화
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTPS 강제 (온프레미스 HTTPS 사용 시)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 권한 정책: 불필요한 브라우저 기능 비활성화
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # --- 압축 ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 256;
    gzip_vary on;

    # --- 캐싱 ---

    # 정적 에셋 (해시 포함 파일명) — 장기 캐시
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM 파일 — 장기 캐시 + 올바른 MIME 타입
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — 캐시 없음 (항상 최신)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 백엔드 변환 서비스 리버스 프록시
    location /api/ {
        proxy_pass http://converter:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 500M;
    }

    # SPA 라우팅: 모든 경로를 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 숨김 파일 접근 차단
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 파일 업로드 크기 제한 (DWG 파일 업로드용)
    client_max_body_size 500M;
}
